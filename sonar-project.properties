sonar.projectKey=achamigos-backend
sonar.organization=luanzeraa-lab
sonar.projectName=Achamigos Backend
sonar.projectVersion=1.5.0

sonar.sources=.
sonar.inclusions=controllers/**/*.ts,models/**/*.ts,services/**/*.ts,routes/**/*.ts,middleware/**/*.ts,utils/**/*.ts,config/**/*.ts,api.ts
sonar.exclusions=node_modules/**,dist/**,coverage/**,.git/**,.github/**,public/**,docs/**

sonar.tests=tests
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/index.test.js
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.test.js,node_modules/**,dist/**,coverage/**,tests/**

# Coverage reports - LCOV format (multiple paths for compatibility)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverageReportPaths=

# Encoding
sonar.sourceEncoding=UTF-8

# Language detection
sonar.language=ts

# Additional configurations
sonar.cpd.exclusions=**/*.spec.ts,**/*.test.ts,**/*.test.js
sonar.skip.design.files=false

# Login and host (if needed for CI/CD)
# sonar.login=your_token_here
# sonar.host.url=https://sonarcloud.io