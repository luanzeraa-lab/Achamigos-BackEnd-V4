name: Release

permissions:
  contents: write

on:
  push:
    branches:
      - main   # 🔥 só main gera versão

jobs:
  version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install

      - name: Rodar build
        run: npm run build

      - name: Rodar testes
        run: npm test

      - name: Instalar semver
        run: npm install -g semver

      - name: Calcular nova versão
      - name: Incrementar versão automaticamente
        run: |
          NEW_VERSION=$(npm version patch --no-git-tag-version | sed 's/^v//')
          echo "Nova versão: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

      - name: Atualizar package.json
        run: npm version ${{ env.new_version }} --no-git-tag-version

      - name: Commit + Tag (APENAS NA MAIN)
      - name: Commit e criar tag
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add package.json package-lock.json
          git commit -m "chore(release): version $new_version [skip ci]" || echo "Sem mudanças"

          TAG_NAME="v${{ env.new_version }}"

          if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git tag "$TAG_NAME"
          fi

          git push origin main
          git push origin "$TAG_NAME"
          BRANCH_NAME="${{ github.ref_name }}"
          BRANCH_SLUG=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._/-]#-#g' | tr '/' '-')

          if [ "$BRANCH_NAME" = "main" ]; then
            TAG_NAME="v$new_version"
          else
            TAG_NAME="v$new_version-$BRANCH_SLUG"
          fi

          git tag -l | grep "^$TAG_NAME$" || git tag "$TAG_NAME"

          git push origin HEAD:${{ github.ref_name }}
          git push origin "$TAG_NAME"

      - name: Enviar email se falhar
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Falha no pipeline - ${{ github.repository }}
          body: O pipeline do GitHub Actions falhou.
          to: ${{ secrets.EMAIL_USER }}
          from: GitHub Actions
