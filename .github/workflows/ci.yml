name: Backend CI

on:
  push:
    branches:
      - main
      - develop

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Instalar dependências
        run: npm install
      - name: Rodar build e testes
        run: |
          npm run build
          npm run test:coverage
      - name: SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.projectKey=achamigos-backend -Dsonar.organization=luanzeraa-lab
      - name: Calcular nova versão
        id: version
        run: |
          npm install -g semver
          LAST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          VERSION_TYPE="patch"
          if [[ "$COMMITS" == *"BREAKING CHANGE"* ]]; then VERSION_TYPE="major"; elif [[ "$COMMITS" =~ ^feat ]]; then VERSION_TYPE="minor"; fi
          NEW_VERSION=$(semver -i $VERSION_TYPE ${LAST_TAG#v})
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
      - name: Atualizar versão e Docker
        run: |
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version
          docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/achamigos-backend:${{ steps.version.outputs.new_version }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/achamigos-backend:${{ steps.version.outputs.new_version }}
      - name: Salvar artefato da versão
        run: echo ${{ steps.version.outputs.new_version }} > VERSION.txt
      - uses: actions/upload-artifact@v3
        with:
          name: version-info
          path: VERSION.txt