name: Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
    tags-ignore:
      - '*'

jobs:
  version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Rodar build
        run: npm run build

      - name: Rodar testes
        run: npm run test:coverage

      - name: Análise com SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        with:
          args: >
            -Dsonar.projectKey=achamigos-backend
            -Dsonar.organization=luanzeraa-lab
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverageReportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Validação)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: api-node:test

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================================
      # INSTALAR SEMVER
      # =========================================
      - name: Instalar semver
        run: npm install -g semver

      # =========================================
      # CRIAR TAG INICIAL
      # =========================================
      - name: Criar tag inicial caso não exista
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags

          if [ -z "$(git tag)" ]; then
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"

            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

            git tag -a v0.0.0 -m "Initial release"
            git push origin v0.0.0
          fi

      # =========================================
      # CALCULAR NOVA VERSÃO
      # =========================================
      - name: Calcular nova versão
        id: version
        run: |
          git fetch --tags

          LAST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1))

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi

          echo "Versão atual: $LAST_TAG"

          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")

          echo "Commits encontrados:"
          echo "$COMMITS"

          VERSION_TYPE="patch"

          while IFS= read -r COMMIT
          do
            echo "Analisando commit: $COMMIT"

            if [[ "$COMMIT" == *"BREAKING CHANGE"* ]]; then
              VERSION_TYPE="major"
              break

            elif [[ "$COMMIT" =~ ^feat(\(.+\))?: ]]; then
              VERSION_TYPE="minor"

            elif [[ "$COMMIT" =~ ^fix(\(.+\))?: ]]; then
              if [ "$VERSION_TYPE" != "minor" ]; then
                VERSION_TYPE="patch"
              fi
            fi

          done <<< "$COMMITS"

          CURRENT_VERSION=${LAST_TAG#v}

          NEW_VERSION=$(semver -i $VERSION_TYPE $CURRENT_VERSION)

          echo "Nova versão: $NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # =========================================
      # ATUALIZAR PACKAGE.JSON
      # =========================================
      - name: Atualizar package.json
        run: |
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version

      # =========================================
      # COMMIT E TAGS
      # =========================================
      - name: Commit e controle de tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

          git add package.json package-lock.json

          git commit -m "chore(release): version ${{ steps.version.outputs.new_version }} [skip ci]" || echo "Sem mudanças"

          BRANCH_NAME="${{ github.ref_name }}"

          git push origin HEAD:${{ github.ref_name }}

          if [ "$BRANCH_NAME" = "main" ]; then
            TAG_NAME="v${{ steps.version.outputs.new_version }}"

          elif [ "$BRANCH_NAME" = "develop" ]; then
            TAG_NAME="v${{ steps.version.outputs.new_version }}-beta"

          else
            echo "Branch $BRANCH_NAME não gera tag"
            exit 0
          fi

          if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      # =========================================
      # BUILD E PUSH DOCKER
      # =========================================
      - name: Build e Push da imagem Docker
        if: github.ref_name == 'main' || github.ref_name == 'develop'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/achamigos-backend:${{ steps.version.outputs.new_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/achamigos-backend:latest

      # =========================================
      # EMAIL EM CASO DE FALHA
      # =========================================
      - name: Enviar email se falhar
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Falha no pipeline - ${{ github.repository }}
          body: O pipeline do GitHub Actions falhou.
          to: ${{ secrets.EMAIL_USER }}
          from: GitHub Actions
