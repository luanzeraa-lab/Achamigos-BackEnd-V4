name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"] # Este nome deve ser idêntico ao "name:" no ci.yml
    types: [completed]

jobs:
  deploy-hml:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: version-info
      - name: Deploy HML
        run: |
          VERSION=$(cat VERSION.txt)
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_HML }}&imgURL=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/achamigos-backend:$VERSION"

  deploy-prod:
    needs: deploy-hml
    runs-on: ubuntu-latest
    environment: prod 
    if: github.event.workflow_run.head_branch == 'main' # Corrigido para verificar a branch do evento de CI
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: version-info
      - name: Deploy PROD
        run: |
          VERSION=$(cat VERSION.txt)
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}&imgURL=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/achamigos-backend:$VERSION"