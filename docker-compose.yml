
services:
  mongo:
    image: mongo
    container_name: achamigos-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network


  backend:
    build: .
    container_name: achamigos-backend
    ports:
      - "3002:3002"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/achamigos
      - LOGTAIL_SOURCE_TOKEN=h9sCAQmdLY5CoZDz38AxqJ5q
      - GEMINI_API_KEY=AIzaSyA3CUQRCojkHofsPRocfdc8fBVJfTYtZo0
      - API_KEY=1234
    networks:
      - app_network
    

  frontend:
    image: lucas03almeida/front-end_achamigos:1.0.9
    container_name: achamigos-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - API_KEY="1234"
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    depends_on:
      - backend
    networks:
      - app_network


networks:
  app_network:
    driver: bridge

volumes:
  mongo_data: